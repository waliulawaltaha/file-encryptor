<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Client-Side Encryptor</title>
    
    <link rel="icon" type="image/svg+xml" href="assets/encrypted_favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

<main class="m3-card fade-in-up">
    <div id="loading-overlay" class="loading-overlay">
        <div class="m3-spinner"></div>
        <h3 id="loading-text" class="loading-text">Processing...</h3>
    </div>

    <div class="card-top-bar">
        <button type="button" id="theme-toggle" class="m3-icon-btn" aria-label="Toggle Dark Mode">
            <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
        </button>
    </div>

    <div class="m3-card-header">
        <div class="icon-container pulse-animation">
            <span class="material-symbols-outlined main-icon">enhanced_encryption</span>
        </div>
        <h2>File Encryptor</h2>
        <p class="m3-subtitle">Military-grade AES-256-GCM encryption. Runs completely in your browser.</p>
    </div>

    <div class="m3-file-area">
        <input type="file" id="fileInput" class="hidden-file-input" multiple>
        <input type="file" id="folderInput" class="hidden-file-input" webkitdirectory directory multiple>
        
        <div class="file-drop-zone hover-lift" id="drop-zone">
            <span class="material-symbols-outlined upload-icon float-animation">cloud_upload</span>
            <span id="file-name-display" class="file-name">Select data to encrypt or decrypt</span>
            
            <div class="file-actions">
                <button type="button" id="btn-select-file" class="m3-btn m3-btn-tonal btn-small pop-on-hover">
                    <span class="material-symbols-outlined">draft</span> File
                </button>
                <button type="button" id="btn-select-folder" class="m3-btn m3-btn-tonal btn-small pop-on-hover">
                    <span class="material-symbols-outlined">folder_zip</span> Folder
                </button>
            </div>
        </div>
    </div>

    <div class="m3-text-field">
        <label for="password">Encryption Passphrase</label>
        <div class="input-with-icon">
            <span class="material-symbols-outlined input-icon">key</span>
            <input type="password" id="password" placeholder="Enter a strong passphrase">
        </div>
        <div class="strength-meter-container"><div id="strength-bar" class="strength-bar"></div></div>
        <span id="strength-text" class="strength-text"></span>
    </div>

    <div class="button-group">
        <button type="button" id="btn-encrypt" class="m3-btn m3-btn-primary pop-on-hover">
            <span class="material-symbols-outlined btn-icon">enhanced_encryption</span> Encrypt
        </button>
        <button type="button" id="btn-decrypt" class="m3-btn m3-btn-tonal pop-on-hover">
            <span class="material-symbols-outlined btn-icon">lock_open</span> Decrypt
        </button>
    </div>
    
    <div id="status" class="m3-status">
        <div class="status-content">
            <span class="material-symbols-outlined status-icon" style="display:none;">info</span>
            <span id="status-text"></span>
        </div>
        <button type="button" id="btn-copy" class="m3-icon-btn copy-btn pop-on-hover" style="display:none;" title="Copy Output Filename">
            <span class="material-symbols-outlined">content_copy</span>
        </button>
    </div>
</main>

<footer class="m3-footer">
    <p>Version 1.2.0</p>
    <p>Created by <a href="http://www.waliulawaltaha.com" target="_blank" rel="noopener noreferrer">Waliul Awal Taha</a></p>
</footer>

<script type="module" src="js/app.js"></script>

</body>
</html>
